AWSTemplateFormatVersion: "2010-09-09"
Description: Doenet persistent storage (user-uploaded media bucket)

Parameters:
  EnvironmentName:
    Type: String
    Description: The environment name (the SSM prefix path name)

  PublicHostedZoneName:
    Type: "AWS::SSM::Parameter::Value<String>"
    Description: >-
      SSM ref to the hosted zone name (e.g., /dev3/PublicHostedZoneName). The app
      is served at https://<this>, so it is the allowed CORS origin for browser
      uploads.

Resources:
  # User-uploaded image storage. Bucket is private; the media-cdn stack
  # grants read-only access to the CloudFront distribution via OAC. The API
  # still writes server-side via SigV4 using the task role.
  MediaBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "${EnvironmentName}-media-${AWS::AccountId}-${AWS::Region}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      # Browsers upload directly to S3 via a presigned PUT (see media/upload.ts),
      # so the bucket must answer the CORS preflight. Only the app's own origin
      # may PUT; reads are served through CloudFront (a different origin), so no
      # GET/HEAD rule is needed here.
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - !Sub "https://${PublicHostedZoneName}"
            AllowedMethods:
              - PUT
            AllowedHeaders:
              - "*"
            MaxAge: 3000

  MediaBucketSSMParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${EnvironmentName}/S3MediaBucket"
      Type: String
      Value: !Ref MediaBucket
      Description: Bucket name for user-uploaded media (consumed by the API task)

Outputs:
  MediaBucketName:
    Description: Name of the media S3 bucket
    Value: !Ref MediaBucket
