AWSTemplateFormatVersion: "2010-09-09"
Description: "StackSet to deploy the media CDN template to us-east-1 (CloudFront cert region)"

Parameters:
  EnvironmentName:
    Type: String
    Description: The environment name (the SSM prefix path name)
    MaxLength: 10

  PublicHostedZoneId:
    Type: "AWS::SSM::Parameter::Value<String>"

  PublicHostedZoneName:
    Type: "AWS::SSM::Parameter::Value<String>"

  MediaBucketName:
    Type: "AWS::SSM::Parameter::Value<String>"
    Description: SSM ref to the media bucket name (e.g., /dev3/S3MediaBucket)

  MediaBucketRegion:
    Type: String
    Description: Region the media bucket lives in (e.g., us-east-2)

  MediaSubdomain:
    Type: String
    Description: Subdomain label for the CDN
    Default: media

  TemplateS3Bucket:
    Type: String
    Description: S3 bucket containing the media-cdn.yml template

  TemplateS3Key:
    Type: String
    Description: S3 key for the media-cdn.yml template
    Default: cloudformation/media-cdn.yml

  ForceUpdateToken:
    Type: String
    Description: Changes on each deploy to force a StackSet update

# The AWSCloudFormationStackSetAdministrationRole and
# AWSCloudFormationStackSetExecutionRole IAM roles are created by
# s3-hosted-stackset.yml, which deploys first. We reuse them by name here.
Resources:
  MediaCdnStackSet:
    Type: AWS::CloudFormation::StackSet
    Properties:
      StackSetName: !Sub "${EnvironmentName}-media-cdn-stackset"
      Description: StackSet for the media CDN (CloudFront + cert + DNS) in us-east-1
      Tags:
        - Key: TemplateVersion
          Value: "1"
      AdministrationRoleARN: !Sub "arn:aws:iam::${AWS::AccountId}:role/AWSCloudFormationStackSetAdministrationRole"
      ExecutionRoleName: AWSCloudFormationStackSetExecutionRole
      Capabilities:
        - CAPABILITY_NAMED_IAM
      PermissionModel: SELF_MANAGED
      StackInstancesGroup:
        - DeploymentTargets:
            Accounts:
              - !Ref AWS::AccountId
          Regions:
            - us-east-1
      Parameters:
        - ParameterKey: EnvironmentName
          ParameterValue: !Ref EnvironmentName
        - ParameterKey: PublicHostedZoneName
          ParameterValue: !Ref PublicHostedZoneName
        - ParameterKey: PublicHostedZoneId
          ParameterValue: !Ref PublicHostedZoneId
        - ParameterKey: MediaBucketName
          ParameterValue: !Ref MediaBucketName
        - ParameterKey: MediaBucketRegion
          ParameterValue: !Ref MediaBucketRegion
        - ParameterKey: MediaSubdomain
          ParameterValue: !Ref MediaSubdomain
        - ParameterKey: ForceUpdateToken
          ParameterValue: !Ref ForceUpdateToken
      TemplateURL: !Sub "https://${TemplateS3Bucket}.s3.amazonaws.com/${TemplateS3Key}"

Outputs:
  StackSetId:
    Description: ID of the created StackSet
    Value: !Ref MediaCdnStackSet
