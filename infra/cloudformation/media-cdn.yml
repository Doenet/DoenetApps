AWSTemplateFormatVersion: "2010-09-09"
Description: CloudFront CDN for the user-uploaded media bucket

Parameters:
  EnvironmentName:
    Type: String
    Description: The environment name (the SSM prefix path name)
    MaxLength: 10

  PublicHostedZoneName:
    Type: String
    Description: The hosted zone name (e.g., example.com)

  PublicHostedZoneId:
    Type: String
    Description: The Route 53 hosted zone ID

  MediaBucketName:
    Type: String
    Description: Name of the media S3 bucket (created by the storage stack in MediaBucketRegion)

  MediaBucketRegion:
    Type: String
    Description: Region the media bucket lives in (e.g., us-east-2)

  MediaSubdomain:
    Type: String
    Description: Subdomain label for the CDN (e.g., "media" -> media.example.com)
    Default: media

  ForceUpdateToken:
    Type: String
    Description: Changes on each deploy to force a StackSet update

Resources:
  MediaOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${EnvironmentName}-media-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # Cross-region: bucket lives in MediaBucketRegion, but BucketPolicy can be
  # applied from any region — CFN routes the PutBucketPolicy call to the
  # bucket's region automatically.
  MediaBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref MediaBucketName
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${MediaBucketName}/*"
            Condition:
              StringEquals:
                "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${MediaCloudFrontDistribution}"

  MediaCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Sub "${MediaSubdomain}.${PublicHostedZoneName}"
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Sub "${MediaSubdomain}.${PublicHostedZoneName}"
          HostedZoneId: !Ref PublicHostedZoneId

  MediaCloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - Id: MediaS3Origin
            DomainName: !Sub "${MediaBucketName}.s3.${MediaBucketRegion}.amazonaws.com"
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt MediaOriginAccessControl.Id
        DefaultCacheBehavior:
          TargetOriginId: MediaS3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        Enabled: true
        Aliases:
          - !Sub "${MediaSubdomain}.${PublicHostedZoneName}"
        ViewerCertificate:
          AcmCertificateArn: !Ref MediaCertificate
          SslSupportMethod: sni-only
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-media-cloudfront"

  MediaDnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref PublicHostedZoneId
      Name: !Sub "${MediaSubdomain}.${PublicHostedZoneName}"
      Type: A
      AliasTarget:
        DNSName: !GetAtt MediaCloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  MediaDistributionIdParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${EnvironmentName}/MediaDistributionId"
      Type: String
      Value: !Ref MediaCloudFrontDistribution
      Description: CloudFront distribution ID for the media CDN

  MediaUrlParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${EnvironmentName}/MediaUrl"
      Type: String
      Value: !Sub "https://${MediaSubdomain}.${PublicHostedZoneName}"
      Description: Public URL of the media CDN

Outputs:
  MediaDistributionId:
    Description: CloudFront distribution ID
    Value: !Ref MediaCloudFrontDistribution

  MediaDistributionDomainName:
    Description: CloudFront-assigned domain name
    Value: !GetAtt MediaCloudFrontDistribution.DomainName

  MediaUrl:
    Description: Public URL of the media CDN
    Value: !Sub "https://${MediaSubdomain}.${PublicHostedZoneName}"

  ForceUpdateToken:
    Description: Echoes the force-update token used for this deployment
    Value: !Ref ForceUpdateToken
