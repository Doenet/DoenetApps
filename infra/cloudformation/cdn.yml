AWSTemplateFormatVersion: "2010-09-09"
Description: CloudFront CDN backed by a single S3 origin and a custom domain

Parameters:
  EnvironmentName:
    Type: String
    Description: The environment name (the SSM prefix path name)
    MaxLength: 10

  ServiceName:
    Type: String
    Description: Service name used in resource tags and SSM parameter paths (e.g., "media", "images")

  PublicHostedZoneName:
    Type: "AWS::SSM::Parameter::Value<String>"
    Description: SSM ref to the hosted zone name (e.g., /dev3/PublicHostedZoneName)

  PublicHostedZoneId:
    Type: "AWS::SSM::Parameter::Value<String>"
    Description: SSM ref to the Route 53 hosted zone ID

  BucketName:
    Type: "AWS::SSM::Parameter::Value<String>"
    Description: SSM ref to the origin S3 bucket name (e.g., /dev3/S3MediaBucket)

  Subdomain:
    Type: String
    Description: Subdomain label for the CDN (e.g., "media" -> media.example.com). Leave blank for the apex.
    Default: ""

  CertificateArn:
    Type: String
    Description: ARN of the ACM certificate in us-east-1 (created by the cdn-cert stack)

Conditions:
  HasSubdomain: !Not [!Equals [!Ref Subdomain, ""]]

Resources:
  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${EnvironmentName}-${ServiceName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref BucketName
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${BucketName}/*"
            Condition:
              StringEquals:
                "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - Id: S3Origin
            DomainName: !Sub "${BucketName}.s3.${AWS::Region}.amazonaws.com"
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt OriginAccessControl.Id
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        Enabled: true
        Aliases:
          - !If [
              HasSubdomain,
              !Sub "${Subdomain}.${PublicHostedZoneName}",
              !Ref PublicHostedZoneName,
            ]
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-${ServiceName}-cloudfront"

  DnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref PublicHostedZoneId
      Name:
        !If [
          HasSubdomain,
          !Sub "${Subdomain}.${PublicHostedZoneName}",
          !Ref PublicHostedZoneName,
        ]
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  DistributionIdParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${EnvironmentName}/${ServiceName}/DistributionId"
      Type: String
      Value: !Ref CloudFrontDistribution
      Description: CloudFront distribution ID

  UrlParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${EnvironmentName}/${ServiceName}/Url"
      Type: String
      Value: !If
        - HasSubdomain
        - !Sub "https://${Subdomain}.${PublicHostedZoneName}"
        - !Sub "https://${PublicHostedZoneName}"
      Description: Public URL of the CDN

Outputs:
  DistributionId:
    Description: CloudFront distribution ID
    Value: !Ref CloudFrontDistribution

  DistributionDomainName:
    Description: CloudFront-assigned domain name
    Value: !GetAtt CloudFrontDistribution.DomainName

  Url:
    Description: Public URL of the CDN
    Value: !If
      - HasSubdomain
      - !Sub "https://${Subdomain}.${PublicHostedZoneName}"
      - !Sub "https://${PublicHostedZoneName}"
