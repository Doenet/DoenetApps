services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ${DATABASE_NAME:-doenet}
      MYSQL_USER: ${DATABASE_USER:-myuser}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD:-mypassword}
    ports:
      - "${DATABASE_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./configs/mysql:/docker-entrypoint-initdb.d

    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mysqladmin ping -h localhost -uroot -p"$$MYSQL_ROOT_PASSWORD"',
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  s3mock:
    image: adobe/s3mock:latest
    restart: unless-stopped
    environment:
      # Spring Boot properties on com.adobe.testing.s3mock.store.* — env-var
      # form uses underscores and uppercase per Spring's relaxed binding.
      COM_ADOBE_TESTING_S3MOCK_STORE_INITIALBUCKETS: doenet-media
      COM_ADOBE_TESTING_S3MOCK_STORE_RETAINFILESONEXIT: "true"
      COM_ADOBE_TESTING_S3MOCK_STORE_ROOT: /s3-data
    ports:
      - "${MEDIA_S3_PORT:-9090}:9090"
    volumes:
      - s3mock_data:/s3-data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  s3mock_data:
