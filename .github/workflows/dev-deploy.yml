name: Dev Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: Git ref or SHA to deploy
        required: false
        type: string
  push:
    branches: ["main"]

permissions:
  contents: read
  id-token: write
  deployments: write

concurrency:
  group: dev-deploy
  cancel-in-progress: true

jobs:
  # Resolve the ref once and open a GitHub deployment so the repo's dev3
  # Environment always shows what is currently live on dev3. Bookkeeping is
  # best-effort and must never block an actual deploy.
  create-deployment:
    runs-on: ubuntu-latest
    outputs:
      deploy_ref: ${{ steps.ref.outputs.deploy_ref }}
      deployment_id: ${{ steps.open.outputs.deployment_id }}
    steps:
      - name: Resolve deploy ref
        id: ref
        env:
          EVENT: ${{ github.event_name }}
          INPUT_REF: ${{ inputs.deploy_ref }}
          SHA: ${{ github.sha }}
        run: |
          if [[ "$EVENT" == "workflow_dispatch" && -n "$INPUT_REF" ]]; then
            echo "deploy_ref=$INPUT_REF" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_ref=$SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Open GitHub deployment
        id: open
        uses: ./.github/actions/open-deployment
        with:
          environment: dev3
          environment-url: https://dev3.doenet.org
          ref: ${{ steps.ref.outputs.deploy_ref }}
          description: dev3 deploy

  deploy:
    needs: create-deployment
    uses: ./.github/workflows/reusable-deploy-env.yml
    with:
      deploy_ref: ${{ needs.create-deployment.outputs.deploy_ref }}
      env_name: dev3
    secrets: inherit

  record-deployment:
    needs: [create-deployment, deploy]
    if: always() && needs.create-deployment.outputs.deployment_id != ''
    runs-on: ubuntu-latest
    steps:
      # Read-only creds so finalize-deployment can ask whether dev3 is
      # actually awake before claiming a deployment is live. Best-effort:
      # never fails the job; without creds the lights read falls back to
      # treating dev3 as awake.
      - name: Configure AWS credentials
        continue-on-error: true
        uses: aws-actions/configure-aws-credentials@v6
        with:
          audience: sts.amazonaws.com
          role-to-assume: arn:aws:iam::568298704244:role/github-actions-dev3
          role-session-name: dev3-deploy-status
          aws-region: us-east-2

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Finalize GitHub deployment status
        uses: ./.github/actions/finalize-deployment
        with:
          deployment-id: ${{ needs.create-deployment.outputs.deployment_id }}
          environment: dev3
          environment-url: https://dev3.doenet.org
          backend-result: ${{ needs.deploy.outputs.backend_result }}
          frontend-result: ${{ needs.deploy.outputs.frontend_result }}
          site-result: ${{ needs.deploy.outputs.site_result }}
          lights-parameter: /dev3/doenet/lights
