name: Prod Deploy

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  id-token: write
  deployments: write

# Never cancel a deploy that has started: killing a run mid-S3-sync or
# mid-ECS-rollout (or mid-rollback) can leave prod half-updated. Queued
# runs are safe to supersede — GitHub keeps only the newest pending run,
# and branch protection guarantees it contains every earlier merge.
concurrency:
  group: prod-deploy
  cancel-in-progress: false

jobs:
  # Open a GitHub deployment so the repo's prod Environment always shows
  # what is currently live. Uses the Deployments API rather than an
  # `environment:` key so environment protection rules can never gate the
  # deploy, and the deploy job does not depend on this one — bookkeeping
  # must never block or skip an actual deploy.
  create-deployment:
    runs-on: ubuntu-latest
    outputs:
      deployment_id: ${{ steps.open.outputs.deployment_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Open GitHub deployment
        id: open
        uses: ./.github/actions/open-deployment
        with:
          environment: prod
          environment-url: https://doenet.org
          ref: ${{ github.sha }}
          description: prod deploy
          production-environment: "true"

  deploy:
    uses: ./.github/workflows/reusable-deploy-env.yml
    with:
      deploy_ref: ${{ github.sha }}
      env_name: prod
    secrets: inherit

  record-deployment:
    needs: [create-deployment, deploy]
    if: always() && needs.create-deployment.outputs.deployment_id != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Finalize GitHub deployment status
        uses: ./.github/actions/finalize-deployment
        with:
          deployment-id: ${{ needs.create-deployment.outputs.deployment_id }}
          environment: prod
          environment-url: https://doenet.org
          backend-result: ${{ needs.deploy.outputs.backend_result }}
          frontend-result: ${{ needs.deploy.outputs.frontend_result }}
          site-result: ${{ needs.deploy.outputs.site_result }}
