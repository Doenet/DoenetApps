name: Prod Deploy

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  id-token: write
  deployments: write

# Never cancel a deploy that has started: killing a run mid-S3-sync or
# mid-ECS-rollout (or mid-rollback) can leave prod half-updated. Queued
# runs are safe to supersede — GitHub keeps only the newest pending run,
# and branch protection guarantees it contains every earlier merge.
concurrency:
  group: prod-deploy
  cancel-in-progress: false

jobs:
  # Open a GitHub deployment so the repo's prod Environment always shows
  # what is currently live. Uses the Deployments API rather than an
  # `environment:` key so environment protection rules can never gate the
  # deploy, and no deploy job depends on this one — bookkeeping must never
  # block or skip an actual deploy.
  create-deployment:
    runs-on: ubuntu-latest
    outputs:
      deployment_id: ${{ steps.deployment.outputs.deployment_id }}
    steps:
      - name: Open GitHub deployment
        id: deployment
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          payload=$(jq -n --arg ref "$GITHUB_SHA" \
            '{ref: $ref, environment: "prod", required_contexts: [], auto_merge: false, production_environment: true, description: "prod deploy"}')
          id=$(gh api -X POST "repos/${GITHUB_REPOSITORY}/deployments" --input - -q .id <<<"$payload" 2>/dev/null || true)
          if [[ -n "$id" ]]; then
            echo "deployment_id=$id" >> "$GITHUB_OUTPUT"
            gh api -X POST "repos/${GITHUB_REPOSITORY}/deployments/${id}/statuses" \
              -f state=in_progress \
              -f environment=prod \
              -f environment_url=https://doenet.org \
              -f log_url="$RUN_URL" >/dev/null 2>&1 || true
          else
            echo "::warning::could not create prod deployment record; deploy continues"
          fi

  deploy-backend:
    uses: ./.github/workflows/reusable-deploy-backend.yml
    with:
      deploy_ref: ${{ github.sha }}
      aws_region: us-east-2
      ecr_repository: prod/doenet
      ecs_cluster: prod
      ecs_service: doenet-FARGATE
      gha_role: arn:aws:iam::350646758180:role/github-actions-prod
      sns_topic: arn:aws:sns:us-east-2:350646758180:prod-critical-cloudwatch-notifications
      tag_name: main
    secrets: inherit

  deploy-frontend:
    uses: ./.github/workflows/reusable-deploy-frontend.yml
    with:
      deploy_ref: ${{ github.sha }}
      aws_region: us-east-1
      gha_role: arn:aws:iam::350646758180:role/github-actions-prod
      aws_account_id: "350646758180"
      env_name: prod
      build_mode: prod
    secrets: inherit

  deploy-site:
    uses: ./.github/workflows/reusable-deploy-site.yml
    with:
      deploy_ref: ${{ github.sha }}
      aws_region: us-east-1
      gha_role: arn:aws:iam::350646758180:role/github-actions-prod
      aws_account_id: "350646758180"
      env_name: prod
      build_mode: prod
    secrets: inherit

  record-deployment:
    needs: [create-deployment, deploy-backend, deploy-frontend, deploy-site]
    if: always() && needs.create-deployment.outputs.deployment_id != ''
    runs-on: ubuntu-latest
    steps:
      - name: Finalize GitHub deployment status
        env:
          GH_TOKEN: ${{ github.token }}
          ID: ${{ needs.create-deployment.outputs.deployment_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          B: ${{ needs.deploy-backend.result }}
          F: ${{ needs.deploy-frontend.result }}
          S: ${{ needs.deploy-site.result }}
        run: |
          if [[ "$B" == "success" && "$F" == "success" && "$S" == "success" ]]; then
            state=success
            desc="deployed to prod"
          else
            state=failure
            desc="prod deploy failed (backend:$B frontend:$F site:$S)"
          fi
          # On a success status GitHub auto-inactivates the previous prod
          # deployment, so the Environments tab reflects what is currently live.
          gh api -X POST "repos/${GITHUB_REPOSITORY}/deployments/${ID}/statuses" \
            -f state="$state" \
            -f description="$desc" \
            -f environment=prod \
            -f environment_url=https://doenet.org \
            -f log_url="$RUN_URL" >/dev/null
