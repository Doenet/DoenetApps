name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["*"]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    env:
      PORT: 3306
      DATABASE_URL: mysql://root:root@localhost:3306/db

    steps:
      # Checkout repo
      - uses: actions/checkout@v6

      # Setup Node with caching
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      # Install dependencies once
      - run: npm ci

      # -----------------------------
      # Format check
      # -----------------------------
      - name: Format check
        run: npm run format:check

      # -----------------------------
      # Lint check
      # -----------------------------
      - name: Lint (all)
        run: npm run lint:check

      # -----------------------------
      # Build
      # -----------------------------
      - name: Build
        run: npm run build

      # -----------------------------
      # Shared package tests
      # -----------------------------
      - name: Test shared package
        run: npm test --workspace @doenet-tools/shared

      # -----------------------------
      # Start MySQL + Test server
      # -----------------------------
      - name: Start MySQL
        run: |
          sudo /etc/init.d/mysql start
          mysql -e "CREATE DATABASE IF NOT EXISTS db;" -uroot -proot

      - run: npm run prisma:migrate-dev --workspace @doenet-tools/api
      - run: npm run prisma:seed --workspace @doenet-tools/api

      - name: Test server
        run: npm test --workspace @doenet-tools/api

  # -----------------------------
  # E2E Tests (Grouped)
  # -----------------------------
  e2e-tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        test-group: [group1, group2, group3, group4]

    services:
      # S3-compatible mock so the image upload e2e test can put bytes
      # somewhere. Mirrors the adobe/s3mock service in docker-compose.yml.
      s3mock:
        image: adobe/s3mock:latest
        ports:
          - 9090:9090
        env:
          COM_ADOBE_TESTING_S3MOCK_STORE_INITIALBUCKETS: doenet-media

    env:
      DATABASE_URL: mysql://root:root@localhost:3306/db
      # OAuth environment variables for CI (dummy values for testing)
      GOOGLE_CLIENT_ID: ci-test-client-id
      GOOGLE_CLIENT_SECRET: ci-test-client-secret
      GITHUB_CLIENT_ID: ci-test-client-id
      GITHUB_CLIENT_SECRET: ci-test-client-secret
      SESSION_SECRET: ci-test-session-secret
      MAGIC_LINK_SECRET: ci-test-magic-link-secret
      APP_URL: http://localhost:8000
      EMAIL_SES_REGION: us-east-1
      EMAIL_SES_FROM_ADDRESS: noreply@example.com
      MOCK_SIGNIN_EMAIL: "true"
      # Enable test features for CI
      ENABLE_TEST_AUTH_BYPASS: "true"
      ENABLE_TEST_ROUTES: "true"
      # Media storage — points at the s3mock service above.
      MEDIA_S3_MODE: "local"
      MEDIA_S3_REGION: "us-east-1"
      MEDIA_S3_BUCKET: "doenet-media"
      MEDIA_S3_LOCAL_ENDPOINT: "http://localhost:9090"
      MEDIA_S3_LOCAL_ACCESS_KEY_ID: "ci"
      MEDIA_S3_LOCAL_SECRET_ACCESS_KEY: "ci"

    steps:
      # Checkout repo
      - uses: actions/checkout@v6

      # Setup Node with caching
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      # Install dependencies
      - run: npm ci

      # Start MySQL
      - name: Start MySQL
        run: |
          sudo /etc/init.d/mysql start
          mysql -e "CREATE DATABASE IF NOT EXISTS db;" -uroot -proot

      - run: npm run prisma:migrate-dev --workspace @doenet-tools/api
      - run: npm run prisma:seed --workspace @doenet-tools/api

      - name: Build shared package
        run: npm run build --workspace @doenet-tools/shared

      # Start server in background (port 3000)
      - name: Start server
        run: |
          npm run dev --workspace @doenet-tools/api > /tmp/server.log 2>&1 &
          echo $! > /tmp/server.pid
        env:
          NODE_ENV: development

      # Start client dev server in background (port 8000)
      - name: Start client
        run: |
          npm run dev --workspace @doenet-tools/app > /tmp/client.log 2>&1 &
          echo $! > /tmp/client.pid
        env:
          NODE_ENV: production

      # Wait for servers to be ready
      - name: Wait for servers
        run: |
          npx wait-on http://localhost:3000 http://localhost:8000 --timeout 60000

      - name: Check server logs if wait-on fails
        if: failure()
        run: |
          echo "=== Server Log ===" && cat /tmp/server.log || true
          echo "=== Client Log ===" && cat /tmp/client.log || true
          echo "=== Server processes ===" && ps aux | grep "node\|npm" || true

      # Run Cypress e2e tests (grouped)
      - name: Run Cypress e2e tests
        run: npm run test:${{ matrix.test-group }} --workspace @doenet-tools/e2e-tests

      # Upload screenshots and videos on failure
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: cypress-screenshots-${{ matrix.test-group }}
          path: packages/e2e-tests/cypress/screenshots
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: cypress-videos-${{ matrix.test-group }}
          path: packages/e2e-tests/cypress/videos
          if-no-files-found: ignore

  # Separate job for brittle tests
  e2e-brittle-tests:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: mysql://root:root@localhost:3306/db
      GOOGLE_CLIENT_ID: ci-test-client-id
      GOOGLE_CLIENT_SECRET: ci-test-client-secret
      GITHUB_CLIENT_ID: ci-test-client-id
      GITHUB_CLIENT_SECRET: ci-test-client-secret
      SESSION_SECRET: ci-test-session-secret
      MAGIC_LINK_SECRET: ci-test-magic-link-secret
      APP_URL: http://localhost:8000
      EMAIL_SES_REGION: us-east-1
      EMAIL_SES_FROM_ADDRESS: noreply@example.com
      MOCK_SIGNIN_EMAIL: "true"
      ENABLE_TEST_AUTH_BYPASS: "true"
      ENABLE_TEST_ROUTES: "true"
      # Media storage — local mode is fine for CI; the existing brittle tests
      # don't actually upload images, but loadMediaConfig() must succeed at
      # API boot so the server starts.
      MEDIA_S3_MODE: "local"
      MEDIA_S3_REGION: "us-east-1"
      MEDIA_S3_BUCKET: "doenet-media"
      MEDIA_S3_LOCAL_ENDPOINT: "http://localhost:9090"
      MEDIA_S3_LOCAL_ACCESS_KEY_ID: "ci"
      MEDIA_S3_LOCAL_SECRET_ACCESS_KEY: "ci"

    strategy:
      fail-fast: false
      matrix:
        test-group: [brittle1, brittle2, brittle3]

    steps:
      # Checkout repo
      - uses: actions/checkout@v6

      # Setup Node with caching
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      # Install dependencies
      - run: npm ci

      # Start MySQL
      - name: Start MySQL
        run: |
          sudo /etc/init.d/mysql start
          mysql -e "CREATE DATABASE IF NOT EXISTS db;" -uroot -proot

      - run: npm run prisma:migrate-dev --workspace @doenet-tools/api
      - run: npm run prisma:seed --workspace @doenet-tools/api

      - name: Build shared package
        run: npm run build --workspace @doenet-tools/shared

      # Start server in background
      - name: Start server
        run: |
          npm run dev --workspace @doenet-tools/api > /tmp/server.log 2>&1 &
          echo $! > /tmp/server.pid
        env:
          NODE_ENV: development

      # Start client dev server in background
      - name: Start client
        run: |
          npm run dev --workspace @doenet-tools/app > /tmp/client.log 2>&1 &
          echo $! > /tmp/client.pid
        env:
          NODE_ENV: production

      # Wait for servers to be ready
      - name: Wait for servers
        run: |
          npx wait-on http://localhost:3000 http://localhost:8000 --timeout 60000

      - name: Check server logs if wait-on fails
        if: failure()
        run: |
          echo "=== Server Log ===" && cat /tmp/server.log || true
          echo "=== Client Log ===" && cat /tmp/client.log || true
          echo "=== Server processes ===" && ps aux | grep "node\|npm" || true

      # Run brittle tests with aggressive retry (grouped)
      - name: Run Brittle Tests
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 30
          max_attempts: 3
          command: npm run test:${{ matrix.test-group }} --workspace @doenet-tools/e2e-tests

      # Upload screenshots and videos on failure
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: brittle-cypress-screenshots
          path: packages/e2e-tests/cypress/screenshots
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: brittle-cypress-videos
          path: packages/e2e-tests/cypress/videos
          if-no-files-found: ignore

  # Light-mode component tests. Job names stay `component-tests (groupN)` so the
  # existing required status checks keep resolving. Dark mode runs in the
  # separate `component-tests-dark` job below (kept separate to preserve these
  # required check names).
  component-tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        test-group: [group1, group2, group3, group4]

    steps:
      # Checkout repo
      - uses: actions/checkout@v6

      # Setup Node with caching
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      # Install dependencies
      - run: npm ci

      - name: Build shared package
        run: npm run build --workspace @doenet-tools/shared

      # Run component tests (grouped)
      - name: Run component tests
        run: npm run test:${{ matrix.test-group }} --workspace @doenet-tools/app

      # Upload artifacts on failure
      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: component-test-artifacts-${{ matrix.test-group }}
          path: |
            apps/app/cypress/screenshots/
            apps/app/cypress/videos/
          retention-days: 7

  # Dark-mode component tests: same specs with `--env colorMode=dark`, so
  # accessibility/contrast regressions are caught in dark mode too. Separate job
  # (new check names `component-tests-dark (groupN)`) so it does not disturb the
  # required `component-tests (groupN)` checks. Add these as required checks in
  # branch-protection settings to make dark failures block merges.
  component-tests-dark:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        test-group: [group1, group2, group3, group4]

    steps:
      # Checkout repo
      - uses: actions/checkout@v6

      # Setup Node with caching
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      # Install dependencies
      - run: npm ci

      - name: Build shared package
        run: npm run build --workspace @doenet-tools/shared

      # Run component tests (grouped) in dark mode
      - name: Run component tests (dark)
        run: npm run test:${{ matrix.test-group }}:dark --workspace @doenet-tools/app

      # Upload artifacts on failure
      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: component-test-artifacts-${{ matrix.test-group }}-dark
          path: |
            apps/app/cypress/screenshots/
            apps/app/cypress/videos/
          retention-days: 7
